<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF-Rechner - Rechnungsverwaltung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="language-switcher-header">
                <button id="langEn" class="lang-btn active">EN</button>
                <button id="langDe" class="lang-btn">DE</button>
            </div>
            <h1 data-en="📄 PDF Calculator" data-de="📄 PDF-Rechner">📄 PDF-Rechner</h1>
            <p data-en="Upload your invoice PDFs and get a monthly overview" data-de="Laden Sie Ihre Rechnungs-PDFs hoch und erhalten Sie eine monatliche Übersicht">Laden Sie Ihre Rechnungs-PDFs hoch und erhalten Sie eine monatliche Übersicht</p>
        </header>

        <main>
            <div class="upload-section">
                <h2 data-en="Upload Invoice" data-de="Rechnung hochladen">Rechnung hochladen</h2>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="file-input-wrapper">
                        <input type="file" id="pdfFile" name="pdfFile" accept=".pdf" multiple required>
                        <label for="pdfFile" class="file-label">
                            <span class="file-label-text" data-en="Select PDF files (multiple files possible)" data-de="PDF-Dateien auswählen (mehrere möglich)">PDF-Dateien auswählen (mehrere möglich)</span>
                            <span class="file-label-icon">📁</span>
                        </label>
                    </div>
                    <div id="selectedFiles" class="selected-files"></div>
                    
                    <div class="form-group">
                        <label for="language" class="form-label" data-en="Invoice Language" data-de="Sprache der Rechnung">Sprache der Rechnung</label>
                        <select id="language" name="language" class="form-select">
                            <option value="de">Deutsch</option>
                            <option value="en">English</option>
                            <option value="fr">Français</option>
                            <option value="es">Español</option>
                            <option value="it">Italiano</option>
                            <option value="pt">Português</option>
                            <option value="ru">Русский</option>
                            <option value="zh-CN">中文</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                            <option value="ar">العربية</option>
                            <option value="hi">हिन्दी</option>
                            <option value="nl">Nederlands</option>
                            <option value="pl">Polski</option>
                            <option value="sv">Svenska</option>
                            <option value="da">Dansk</option>
                            <option value="fi">Suomi</option>
                            <option value="cs">Čeština</option>
                            <option value="hu">Magyar</option>
                            <option value="ro">Română</option>
                            <option value="tr">Türkçe</option>
                            <option value="el">Ελληνικά</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-primary" data-en="Process Invoice" data-de="Rechnung verarbeiten">Rechnung verarbeiten</button>
                </form>
                <div id="uploadStatus" class="status-message"></div>
                
                <!-- Progress Bar for Multiple Uploads -->
                <div id="uploadProgress" class="upload-progress" style="display: none;">
                    <div class="progress-info">
                        <span id="progressText">Verarbeite Rechnung 1 von 5...</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressBar" class="progress-bar-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

                <div class="results-section">
                <div class="section-title">
                    <h2 data-en="Recognized Invoice Information" data-de="Erkannte Rechnungsinformationen">Erkannte Rechnungsinformationen</h2>
                </div>
                <div id="invoiceDetails" class="invoice-details"></div>
                <div id="invoiceBreakdown" class="invoice-breakdown" style="display: none;"></div>
            </div>

            <div class="summary-section">
                <div class="section-title">
                    <h2 data-en="Monthly Summary" data-de="Monatliche Zusammenfassung">Monatliche Zusammenfassung</h2>
                    <button id="clearAll" class="btn-secondary" data-en="Delete All Data" data-de="Alle Daten löschen">Alle Daten löschen</button>
                </div>
                <div id="monthlySummary" class="monthly-summary"></div>
                <div id="monthlyVATSummary" class="monthly-vat-summary" style="display: none;"></div>
            </div>
        </main>

        <footer class="main-footer">
            <div class="footer-links">
                <a href="impressum.html">Impressum</a> | 
                <a href="datenschutzerklaerung.html">Datenschutzerklärung</a>
            </div>
            <div class="footer-copyright">
                © 2025 Bilke Web- und Softwareentwicklung
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
